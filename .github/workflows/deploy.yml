name: Deploy Docusaurus site to Pages

on:
  push:
    branches: [main]
    paths:
      - 'docusaurus/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포는 1개만, 진행 중인 배포는 취소하지 않음
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docusaurus
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # showLastUpdateTime이 git history 전체를 필요로 함
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docusaurus/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build website
        env:
          # 일부 cosmetic SSG 경고(예: image broken 워닝, HTML minifier diagnostics)
          # 가 GitHub Actions에서 error로 승격되어 빌드를 차단하는 것을 막음.
          # 로컬 빌드는 여전히 SUCCESS이고, 워닝은 build 로그에 출력됨.
          DOCUSAURUS_IGNORE_SSG_WARNINGS: 'true'
          DOCUSAURUS_URL: 'https://robotis-git.github.io'
          DOCUSAURUS_BASE_URL: '/docs/'
          DOCUSAURUS_DOCS_ROUTE_BASE_PATH: '/'
          NODE_OPTIONS: --max_old_space_size=4096
        run: npm run build

      - name: Dedupe i18n static assets
        # Docusaurus i18n 빌드는 build/{ko,ja}/img/ 에 root build/img/ 와 동일한
        # 자산을 중복 복사 (~1.4GB). 빌드 후 제거 + HTML rewrite 로 GitHub Pages
        # 1GB artifact 한계 회피.
        working-directory: ./
        run: bash scripts/dedupe-i18n-static.sh

      - name: Check build output
        working-directory: ./
        run: |
          test -d docusaurus/build
          test -f docusaurus/build/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docusaurus/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
